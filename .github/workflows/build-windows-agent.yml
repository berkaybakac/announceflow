name: Build Windows Agent

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller requests keyring pystray pillow

      - name: Build EXE
        working-directory: agent
        run: |
          python build_agent.py

      - name: Smoke test - sender subprocess mode
        working-directory: agent
        run: |
          $exe = "dist\AnnounceFlowAgent.exe"

          # Start sender subprocess mode
          $proc = Start-Process -FilePath $exe `
            -ArgumentList "--stream-sender","127.0.0.1","5800" `
            -PassThru -NoNewWindow
          Start-Sleep -Seconds 2

          if ($proc.HasExited) {
            Write-Error "Sender subprocess exited unexpectedly (exit=$($proc.ExitCode))"
            exit 1
          }

          Stop-Process -Id $proc.Id -Force
          Write-Host "PASS: sender subprocess started and stopped successfully"
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AnnounceFlowAgent-Windows
          path: agent/dist/AnnounceFlowAgent.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: agent/dist/AnnounceFlowAgent.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
