name: Build Windows Agent

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r agent/requirements-agent.txt

      - name: Build EXE
        working-directory: agent
        run: |
          python build_agent.py

      - name: Smoke test - EXE exists
        working-directory: agent
        run: |
          $exe = "dist\StatekSound.exe"
          if (!(Test-Path $exe)) {
            Write-Error "EXE not found at $exe"
            exit 1
          }
          Write-Host "PASS: EXE built successfully"
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: StatekSound
          path: agent/dist/StatekSound.exe
