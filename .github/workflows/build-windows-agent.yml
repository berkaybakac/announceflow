name: Build Windows Agent

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pystray pillow requests

      - name: Build EXE
        working-directory: agent
        run: |
          python -m PyInstaller --onefile --noconsole --name AnnounceFlowAgent agent.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AnnounceFlowAgent-Windows
          path: agent/dist/AnnounceFlowAgent.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: agent/dist/AnnounceFlowAgent.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
