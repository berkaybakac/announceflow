name: Build Windows Agent

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r agent/requirements-agent.txt

      - name: Download ffmpeg
        working-directory: agent
        run: |
          $ffmpegUrl = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          Invoke-WebRequest -Uri $ffmpegUrl -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_extract
          $ffmpegExe = Get-ChildItem -Path ffmpeg_extract -Recurse -Filter "ffmpeg.exe" | Where-Object { $_.DirectoryName -like "*bin*" } | Select-Object -First 1
          Copy-Item $ffmpegExe.FullName -Destination "ffmpeg.exe"
          Write-Host "ffmpeg.exe copied to agent/ffmpeg.exe"
        shell: pwsh

      - name: Download VB-Cable installer
        working-directory: agent
        run: |
          $vbcableUrl = "https://download.vb-audio.com/Download_CABLE/VBCABLE_Driver_Pack43.zip"
          Invoke-WebRequest -Uri $vbcableUrl -OutFile vbcable.zip
          Expand-Archive -Path vbcable.zip -DestinationPath vbcable_extract
          Copy-Item "vbcable_extract\VBCABLE_Setup_x64.exe" -Destination "VBCABLE_Setup_x64.exe"
          Write-Host "VB-Cable installer copied to agent/VBCABLE_Setup_x64.exe"
        shell: pwsh

      - name: Build EXE
        working-directory: agent
        run: |
          python build_agent.py

      - name: Smoke test - EXE and bundled binaries
        working-directory: agent
        run: |
          $exe = "dist\AnnounceFlowAgent.exe"
          if (!(Test-Path $exe)) {
            Write-Error "EXE not found at $exe"
            exit 1
          }
          Write-Host "PASS: EXE built"

          # Verify ffmpeg.exe was available for bundling
          if (!(Test-Path "ffmpeg.exe")) {
            Write-Error "ffmpeg.exe not found - bundle failed"
            exit 1
          }
          Write-Host "PASS: ffmpeg.exe available for bundle"

          # Verify VB-Cable installer was available for bundling
          if (!(Test-Path "VBCABLE_Setup_x64.exe")) {
            Write-Error "VBCABLE_Setup_x64.exe not found - bundle failed"
            exit 1
          }
          Write-Host "PASS: VB-Cable installer available for bundle"

          Write-Host "PASS: All bundled binaries verified"
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AnnounceFlowAgent-Windows
          path: agent/dist/AnnounceFlowAgent.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: agent/dist/AnnounceFlowAgent.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
